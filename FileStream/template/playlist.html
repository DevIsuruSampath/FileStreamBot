<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist ({{count}})</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/plyr.css" />
    <script src="/static/plyr.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f13; }
        .plyr { border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(79, 70, 229, 0.15); border: 1px solid rgba(255,255,255,0.05); }
        :root { --plyr-color-main: #4f46e5; }
        .active-item { background: rgba(79, 70, 229, 0.15); border-color: rgba(79, 70, 229, 0.4); }
        .btn { display:inline-flex; align-items:center; justify-content:center; padding:0.375rem 0.75rem; border-radius:0.5rem; font-size:0.75rem; font-weight:600; }
        .btn-play { background: rgba(79, 70, 229, 0.2); color: #c7d2fe; border: 1px solid rgba(79, 70, 229, 0.35); }
        .btn-download { background: rgba(255,255,255,0.08); color: #e5e7eb; border: 1px solid rgba(255,255,255,0.12); }
        .btn-disabled { opacity: .5; cursor: not-allowed; }
    </style>
</head>
<body class="text-gray-300 antialiased">
    <nav class="border-b border-white/5 bg-[#0f0f13]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <span class="text-white font-bold text-lg tracking-tight">Playlist</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6 lg:gap-8">
        <div class="lg:w-3/4">
            <div class="relative aspect-video bg-black rounded-2xl mb-4 shadow-2xl">
                <video id="player" playsinline controls></video>
            </div>
            <div class="space-y-2">
                <h1 id="currentTitle" class="text-xl md:text-2xl font-bold text-white break-all leading-snug"></h1>
                <div class="text-sm text-gray-400" id="currentMeta"></div>
                <div class="flex gap-2 pt-2">
                    <button id="playBtn" class="btn btn-play">Play</button>
                    <a id="downloadBtn" class="btn btn-download" href="#" download>Download</a>
                </div>
            </div>
        </div>

        <aside class="lg:w-1/4">
            <div class="bg-[#18181b] border border-white/5 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-white font-semibold text-sm uppercase tracking-wider text-gray-400">Playlist</h3>
                    <span class="text-xs text-gray-500">{{count}} items</span>
                </div>
                <ul id="playlist" class="space-y-2 max-h-[70vh] overflow-y-auto pr-1">
                    {% for f in files %}
                    <li class="playlist-item border border-white/5 rounded-xl p-3" data-index="{{ loop.index0 }}" data-playable="{{ '1' if f.playable else '0' }}">
                        <div class="text-sm text-white font-medium break-all">{{ f.name }}</div>
                        <div class="text-xs text-gray-400">{{ f.size }}</div>
                        <div class="mt-2 flex gap-2">
                            <button class="btn btn-play play-item {{ '' if f.playable else 'btn-disabled' }}" {{ '' if f.playable else 'disabled' }} data-index="{{ loop.index0 }}">Play</button>
                            <a class="btn btn-download" href="{{ f.url }}" download>Download</a>
                        </div>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </aside>
    </main>

    <script>
        const playlist = {{ playlist_json | safe }};
        const listEl = document.getElementById('playlist');
        const titleEl = document.getElementById('currentTitle');
        const metaEl = document.getElementById('currentMeta');
        const playBtn = document.getElementById('playBtn');
        const downloadBtn = document.getElementById('downloadBtn');

        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['speed', 'loop'],
        });

        let currentIndex = 0;

        function setActive(index) {
            document.querySelectorAll('.playlist-item').forEach((el) => {
                el.classList.remove('active-item');
            });
            const active = document.querySelector(`.playlist-item[data-index="${index}"]`);
            if (active) active.classList.add('active-item');
        }

        function updateHeader(item) {
            titleEl.textContent = item.name;
            metaEl.textContent = item.size || '';
            downloadBtn.href = item.url;
            if (item.playable) {
                playBtn.classList.remove('btn-disabled');
                playBtn.disabled = false;
            } else {
                playBtn.classList.add('btn-disabled');
                playBtn.disabled = true;
            }
        }

        function loadVideo(index, autoPlay = true) {
            if (!playlist[index]) return;
            const item = playlist[index];
            currentIndex = index;
            setActive(index);
            updateHeader(item);

            if (!item.playable) {
                player.pause();
                try { player.currentTime = 0; } catch (e) {}
                return;
            }

            const mediaType = item.kind === 'audio' ? 'audio' : 'video';
            const fallbackMime = mediaType === 'audio' ? 'audio/mpeg' : 'video/mp4';
            player.source = {
                type: mediaType,
                title: item.name,
                sources: [{ src: item.url, type: item.mime || fallbackMime }]
            };

            if (autoPlay) player.play();
        }

        function nextPlayable(startIdx) {
            for (let i = startIdx; i < playlist.length; i++) {
                if (playlist[i].playable) return i;
            }
            return -1;
        }

        listEl.addEventListener('click', (e) => {
            // Ignore download link clicks
            if (e.target.closest('a')) return;

            const playButton = e.target.closest('.play-item');
            if (playButton) {
                const index = parseInt(playButton.dataset.index, 10);
                loadVideo(index);
                return;
            }

            const item = e.target.closest('.playlist-item');
            if (item) {
                const index = parseInt(item.dataset.index, 10);
                loadVideo(index);
            }
        });

        playBtn.addEventListener('click', () => {
            loadVideo(currentIndex);
        });

        player.on('ended', () => {
            const next = nextPlayable(currentIndex + 1);
            if (next !== -1) loadVideo(next);
        });

        // Init first item (prefer first playable)
        if (playlist.length > 0) {
            const firstPlayable = nextPlayable(0);
            loadVideo(firstPlayable !== -1 ? firstPlayable : 0, false);
        }
    </script>
</body>
</html>
