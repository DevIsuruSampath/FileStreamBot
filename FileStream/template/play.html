<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | {{file_name}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f13; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f0f13; }
        ::-webkit-scrollbar-thumb { background: #2d2d3a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4f46e5; }
        /* Plyr Customization */
        .plyr { border-radius: 12px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }
        .plyr--full-ui input[type=range] { color: #4f46e5; }
        .plyr__control--overlaid { background: rgba(79, 70, 229, 0.9); }
        .plyr--video .plyrcontrol.plyrtab-focus, .plyr--video .plyr__control:hover, .plyr--video .plyr__control[aria-expanded=true] { background: #4f46e5; }
    </style>
</head>
<body class="text-gray-300">
    <nav class="border-b border-gray-800 bg-[#0f0f13]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <span class="text-white font-bold text-xl tracking-tight">StreamBot</span>
                </div>
                <a href="https://t.me/YourChannel" class="text-sm bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-colors">
                    Join Channel
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8 lg:flex lg:gap-10">
        <div class="lg:w-3/4 mb-8 lg:mb-0">
            <div class="relative aspect-video bg-black rounded-2xl mb-6 shadow-2xl">
                <video id="player" playsinline controls>
                    <source src="{{file_url}}" type="video/mp4" />
                </video>
            </div>
            <div class="space-y-4">
                <h1 class="text-2xl font-bold text-white break-words leading-tight">{{file_name}}</h1>
                <div class="flex items-center gap-4 text-sm text-gray-500">
                    <span class="flex items-center gap-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg> {{file_size}}</span>
                    <span class="bg-indigo-900/30 text-indigo-400 px-2 py-0.5 rounded border border-indigo-500/20 text-xs">High Speed</span>
                </div>
            </div>
        </div>

        <div class="lg:w-1/4 space-y-6">
            <div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-6">
                <h3 class="text-white font-semibold mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    Quick Actions
                </h3>
                <div class="space-y-3">
                    <button onclick="window.location.href='{{file_url}}'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        Download File
                    </button>
                    <button onclick="copyLink()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-3 rounded-lg flex items-center justify-center gap-2 transition-all">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        Copy Stream Link
                    </button>
                </div>
            </div>

            <div class="bg-gray-800/50 border border-gray-700/50 rounded-xl p-6">
                <h3 class="text-white font-semibold mb-4 text-sm uppercase tracking-wider text-gray-400">Open External</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openPlayer('vlc')" class="bg-gray-700/50 hover:bg-orange-600/20 hover:border-orange-500/50 border border-transparent text-gray-300 hover:text-orange-500 py-3 rounded-lg text-sm font-medium transition-all">
                        VLC Player
                    </button>
                    <button onclick="openPlayer('mx')" class="bg-gray-700/50 hover:bg-blue-600/20 hover:border-blue-500/50 border border-transparent text-gray-300 hover:text-blue-500 py-3 rounded-lg text-sm font-medium transition-all">
                        MX Player
                    </button>
                    <button onclick="openPlayer('nplayer')" class="bg-gray-700/50 hover:bg-green-600/20 hover:border-green-500/50 border border-transparent text-gray-300 hover:text-green-500 py-3 rounded-lg text-sm font-medium transition-all">
                        nPlayer
                    </button>
                    <button onclick="openPlayer('km')" class="bg-gray-700/50 hover:bg-purple-600/20 hover:border-purple-500/50 border border-transparent text-gray-300 hover:text-purple-500 py-3 rounded-lg text-sm font-medium transition-all">
                        KMPlayer
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Plyr
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['captions', 'quality', 'speed', 'loop'],
        });

        const fileUrl = '{{file_url}}';

        function copyLink() {
            navigator.clipboard.writeText(fileUrl).then(() => {
                const btn = document.querySelector('button[onclick="copyLink()"]');
                const originalText = btn.innerHTML;
                btn.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!`;
                setTimeout(() => {
                    btn.innerHTML = originalText;
                }, 2000);
            });
        }

        function openPlayer(app) {
            let scheme = '';
            switch(app) {
                case 'vlc': scheme = `vlc://${fileUrl}`; break;
                case 'mx': scheme = `intent:${fileUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title={{file_name}};end`; break;
                case 'nplayer': scheme = `nplayer-${fileUrl}`; break;
                case 'km': scheme = `intent:${fileUrl}#Intent;package=com.kmplayer;end`; break;
            }
            if(scheme) window.location.href = scheme;
        }
    </script>
</body>
</html>
