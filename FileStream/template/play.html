<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream | {{file_name}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/plyr.css" />
    <script src="/static/plyr.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f13; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f13; }
        ::-webkit-scrollbar-thumb { background: #2d2d3a; border-radius: 4px; }
        /* Player Shadow */
        .plyr { border-radius: 12px; overflow: hidden; box-shadow: 0 0 40px rgba(79, 70, 229, 0.15); border: 1px solid rgba(255,255,255,0.05); }
        /* Accent Colors */
        :root { --plyr-color-main: #4f46e5; }
    </style>
</head>
<body class="text-gray-300 antialiased selection:bg-indigo-500 selection:text-white">
    <nav class="border-b border-white/5 bg-[#0f0f13]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </div>
                    <span class="text-white font-bold text-lg tracking-tight">StreamBot</span>
                </div>
                {% if updates_url %}
                <a href="{{ updates_url }}" class="text-xs font-semibold bg-white/5 hover:bg-white/10 border border-white/10 text-white px-4 py-2 rounded-lg transition-all whitespace-nowrap">
                    Join Channel
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6 lg:gap-8">
        <div class="lg:w-3/4">
            {% if is_audio %}
            <div class="relative bg-[#0b0b10] rounded-2xl mb-4 shadow-2xl border border-white/5 p-6 flex items-center gap-4">
                <div class="w-14 h-14 bg-indigo-600/20 rounded-xl flex items-center justify-center">
                    <svg class="w-7 h-7 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-2v13" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19a3 3 0 11-6 0 3 3 0 016 0zm12-2a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </div>
                <div class="flex-1">
                    <audio id="player" controls preload="metadata" class="w-full">
                        <source src="{{file_url}}" type="{{ mime_type }}" />
                    </audio>
                </div>
            </div>
            {% else %}
            <div class="relative aspect-video bg-black rounded-2xl mb-4 shadow-2xl">
                <video id="player" playsinline controls preload="metadata" class="w-full h-full">
                    <source src="{{file_url}}" type="{{ mime_type }}" />
                </video>
            </div>
            {% endif %}
            <div class="space-y-3">
                <h1 class="text-xl md:text-3xl font-bold text-white break-all leading-snug">
                    {{file_name}}
                </h1>
                <div class="flex flex-wrap items-center gap-3 text-sm text-gray-400">
                    <span class="flex items-center gap-1.5 px-3 py-1 rounded-full bg-white/5 border border-white/5 whitespace-nowrap">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" /></svg> {{file_size}}
                    </span>
                    <span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded text-xs font-medium uppercase tracking-wide">
                        High Speed
                    </span>
                </div>
            </div>
        </div>

        <div class="lg:w-1/4 space-y-5">
            <div class="bg-[#18181b] border border-white/5 rounded-2xl p-5">
                <h3 class="text-white font-semibold mb-4 text-sm uppercase tracking-wider text-gray-500 flex items-center gap-2">
                    <svg class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    Quick Actions
                </h3>
                <div class="space-y-3">
                    <button onclick="window.location.href='{{file_url}}'" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-indigo-900/20 active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        Download File
                    </button>
                    <button onclick="copyLink()" id="copyBtn" class="w-full bg-white/5 hover:bg-white/10 border border-white/5 text-gray-300 hover:text-white font-medium py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        Copy Stream Link
                    </button>
                    {% if report_url %}
                    <a href="{{ report_url }}" class="w-full bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 text-red-400 font-medium py-3.5 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95">
                        🚫 Report Adult Content
                    </a>
                    {% endif %}
                </div>
            </div>

            <div class="bg-[#18181b] border border-white/5 rounded-2xl p-5">
                <h3 class="text-white font-semibold mb-4 text-sm uppercase tracking-wider text-gray-500">Open External</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="openPlayer('vlc')" class="bg-white/5 hover:bg-[#ff8800]/10 hover:border-[#ff8800]/30 border border-transparent text-gray-400 hover:text-[#ff8800] py-3 rounded-xl text-sm font-medium transition-all">
                        VLC
                    </button>
                    <button onclick="openPlayer('mx')" class="bg-white/5 hover:bg-[#2b76f6]/10 hover:border-[#2b76f6]/30 border border-transparent text-gray-400 hover:text-[#2b76f6] py-3 rounded-xl text-sm font-medium transition-all">
                        MX Player
                    </button>
                    <button onclick="openPlayer('nplayer')" class="bg-white/5 hover:bg-[#ea4c89]/10 hover:border-[#ea4c89]/30 border border-transparent text-gray-400 hover:text-[#ea4c89] py-3 rounded-xl text-sm font-medium transition-all">
                        nPlayer
                    </button>
                    <button onclick="openPlayer('km')" class="bg-white/5 hover:bg-[#a855f7]/10 hover:border-[#a855f7]/30 border border-transparent text-gray-400 hover:text-[#a855f7] py-3 rounded-xl text-sm font-medium transition-all">
                        KMPlayer
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['captions', 'quality', 'speed', 'loop'],
        });

        const fileUrl = {{ file_url | tojson }};
        const fileName = {{ file_name | tojson }};

        async function copyLink() {
            const btn = document.getElementById('copyBtn');
            const originalHTML = btn.innerHTML;
            try {
                await navigator.clipboard.writeText(fileUrl);
            } catch (e) {
                window.prompt('Copy this link:', fileUrl);
            }
            btn.innerHTML = `<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!`;
            btn.classList.add('text-green-400', 'bg-green-400/10');

            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.classList.remove('text-green-400', 'bg-green-400/10');
            }, 2000);
        }

        function openPlayer(app) {
            let scheme = '';
            const safeUrl = encodeURI(fileUrl);
            const safeTitle = encodeURIComponent(fileName);
            // Intent schemes for Android Apps
            switch(app) {
                case 'vlc': scheme = `vlc://${safeUrl}`; break;
                case 'mx': scheme = `intent:${safeUrl}#Intent;package=com.mxtech.videoplayer.ad;S.title=${safeTitle};end`; break;
                case 'nplayer': scheme = `nplayer-${safeUrl}`; break;
                case 'km': scheme = `intent:${safeUrl}#Intent;package=com.kmplayer;end`; break;
            }
            if(scheme) window.location.href = scheme;
        }
    </script>
</body>
</html>
