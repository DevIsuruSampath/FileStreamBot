<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download | {{ file_name }}</title>
    <style>
        :root {
            --bg: #0a1020;
            --card: rgba(255, 255, 255, 0.08);
            --text: #e8edff;
            --muted: #b6c1dd;
            --primary: #6f8cff;
            --primary-2: #7a5cff;
            --border: rgba(255, 255, 255, 0.16);
            --danger: #f87171;
            --radius: 18px;
            --shadow: 0 16px 36px rgba(0, 0, 0, 0.36);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            color: var(--text);
            background:
                radial-gradient(900px 500px at 8% -10%, rgba(111, 140, 255, 0.28), transparent 60%),
                radial-gradient(1000px 520px at 100% 8%, rgba(122, 92, 255, 0.22), transparent 60%),
                linear-gradient(180deg, #0a1020 0%, #080d1a 100%);
            display: grid;
            place-items: center;
            padding: 24px 12px;
        }

        .card {
            width: min(520px, 100%);
            border-radius: var(--radius);
            padding: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
            text-align: center;
        }

        .icon {
            width: 74px;
            height: 74px;
            border-radius: 16px;
            margin: 0 auto 16px;
            display: grid;
            place-items: center;
            font-size: 34px;
            background: linear-gradient(135deg, rgba(111, 140, 255, 0.28), rgba(45, 212, 191, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: clamp(1.05rem, 2.8vw, 1.4rem);
            line-height: 1.35;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 18px;
        }

        .chip {
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            color: #d7e2ff;
            font-size: 0.82rem;
            padding: 6px 12px;
        }

        .btn {
            width: 100%;
            min-height: 46px;
            border: 0;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            box-shadow: 0 10px 22px rgba(111, 140, 255, 0.4);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 28px rgba(111, 140, 255, 0.5);
        }

        .btn:active { transform: translateY(0); }

        .foot {
            margin-top: 12px;
            color: var(--muted);
            font-size: 0.84rem;
        }

        .report {
            margin-top: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.88rem;
            color: #fecaca;
            border: 1px solid rgba(248, 113, 113, 0.34);
            background: rgba(248, 113, 113, 0.1);
            border-radius: 999px;
            padding: 7px 12px;
            text-decoration: none;
        }

        .report:hover { background: rgba(248, 113, 113, 0.18); }
    </style>
</head>
<body>
    <main class="card">
        <div class="icon">📄</div>
        <h1>{{ file_name }}</h1>
        <div class="meta">
            <span class="chip">💾 {{ file_size }}</span>
            <span class="chip">🗂️ {{ category or 'Other' }}</span>
            <span class="chip">👤 {{ uploader or 'Unknown uploader' }}</span>
            {% if message_id %}<span class="chip">🆔 {{ message_id }}</span>{% endif %}
        </div>

        <a href="{{ file_url }}" download>
            <button class="btn" type="button">⬇️ Download File</button>
        </a>

        <p class="foot">This link works until the file is removed.</p>

        {% if report_url %}
        <a href="{{ report_url }}" class="report">🚫 Report Adult Content</a>
        {% endif %}
    </main>
</body>
</html>
