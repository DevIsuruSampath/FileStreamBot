<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{file_name}} | Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        
        /* Glassmorphism Effect */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Animated Gradient Button */
        .anim-gradient {
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899);
            background-size: 200% 200%;
            animation: gradient 6s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Background Blobs */
        .blob {
            position: absolute;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }
    </style>
</head>
<body class="bg-[#0f0f13] text-white h-screen flex items-center justify-center relative overflow-hidden">
    <div class="blob bg-purple-600 w-96 h-96 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="blob bg-blue-600 w-80 h-80 rounded-full bottom-0 right-0 translate-x-1/3 translate-y-1/3 animation-delay-2000"></div>

    <div class="glass p-8 rounded-3xl w-full max-w-md mx-4 text-center relative z-10 border-t border-white/10">
        <div class="mb-8 relative inline-block">
            <div class="absolute inset-0 bg-indigo-500 blur-xl opacity-50 rounded-full"></div>
            <div class="relative w-20 h-20 bg-gradient-to-br from-gray-800 to-black rounded-2xl flex items-center justify-center border border-white/10 shadow-2xl mx-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold mb-3 break-words bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">
            {{file_name}}
        </h1>

        <div class="flex items-center justify-center gap-3 text-sm text-gray-500 mb-8">
            <span class="bg-white/5 px-3 py-1 rounded-full border border-white/5">
                {{file_size}}
            </span>
            <span class="bg-white/5 px-3 py-1 rounded-full border border-white/5">
                Secure
            </span>
        </div>

        <a href="{{file_url}}" class="block w-full group" download>
            <button class="anim-gradient w-full py-4 rounded-xl font-bold text-lg shadow-lg shadow-indigo-500/25 text-white transition-transform duration-300 group-hover:-translate-y-1 group-active:scale-95">
                <div class="flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download File
                </div>
            </button>
        </a>

        <p class="mt-6 text-xs text-gray-600">
            Link may stop working if the file is deleted.
        </p>
        {% if report_url %}
        <a href="{{ report_url }}" class="mt-4 inline-flex items-center justify-center text-sm text-red-400 hover:text-red-300">
            🚫 Report Adult Content
        </a>
        {% endif %}
    </div>
</body>
</html>
